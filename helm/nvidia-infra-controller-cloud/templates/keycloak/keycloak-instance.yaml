SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

Deploys Keycloak via the RHBK operator CRDs with TLS from cert-manager.
Set keycloakInstance.enabled=false to use an external Keycloak.
*/}}

{{- if .Values.keycloakInstance.enabled }}
{{- $ns := .Values.keycloakInstance.namespace }}
{{- $kc := .Values.keycloakInstance }}
---
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: keycloak-pg
  namespace: {{ $ns }}
  labels:
    app: keycloak
spec:
  postgresVersion: 18
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: {{ $kc.postgresql.storage.size | default "1Gi" }}
  users:
    - name: keycloak
      databases:
        - keycloak
      options: "SUPERUSER"
      password:
        type: AlphaNumeric
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 1Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: {{ $ns }}
spec:
  secretName: keycloak-tls-secret
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - keycloak-service
    - keycloak-service.{{ $ns }}
    - keycloak-service.{{ $ns }}.svc
    - keycloak-service.{{ $ns }}.svc.cluster.local
  issuerRef:
    name: nico-rest-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: {{ $ns }}
  labels:
    {{- include "nvidia-infra-controller-cloud.labels" . | nindent 4 }}
spec:
  instances: 1
  http:
    httpEnabled: true
    tlsSecret: keycloak-tls-secret
  proxy:
    headers: xforwarded
  bootstrapAdmin:
    user:
      secret: keycloak-admin-secret
  db:
    vendor: postgres
    host: keycloak-pg-primary
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-pg-pguser-keycloak
      key: user
    passwordSecret:
      name: keycloak-pg-pguser-keycloak
      key: password
  additionalOptions:
    - name: hostname-strict
      value: "false"
    - name: health-enabled
      value: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: {{ $ns }}
  labels:
    {{- include "nvidia-infra-controller-cloud.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $kc.admin.username }}
  password: {{ $kc.admin.password }}
{{- end }}
