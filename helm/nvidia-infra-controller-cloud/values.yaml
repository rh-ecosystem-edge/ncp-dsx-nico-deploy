# =============================================================================
# Keycloak instance — set enabled=false to use an external Keycloak
# =============================================================================

keycloakInstance:
  enabled: true
  namespace: rhbk-operator
  admin:
    username: admin
    password: admin
  postgresql:
    storage:
      size: 1Gi

# =============================================================================
# Temporal — official chart (https://go.temporal.io/helm-charts) v1.2.0
# =============================================================================

temporalPostgresql:
  enabled: true
  instances: 1
  storage:
    size: 5Gi

temporal:
  fullnameOverride: "temporal"

  server:
    enabled: true
    replicaCount: 1

    image:
      pullPolicy: IfNotPresent

    securityContext: null

    metrics:
      annotations:
        enabled: true
      serviceMonitor:
        enabled: false
      prometheus:
        timerType: histogram

    additionalEnv:
      - name: TEMPORAL_CLI_TLS_CERT
        value: /var/secrets/temporal/certs/tls.crt
      - name: TEMPORAL_CLI_TLS_KEY
        value: /var/secrets/temporal/certs/tls.key
      - name: TEMPORAL_CLI_TLS_CA
        value: /var/secrets/temporal/certs/ca.crt
      - name: TEMPORAL_CLI_TLS_ENABLE_HOST_VERIFICATION
        value: "false"

    additionalVolumeMounts:
      - name: temporal-tls-certs
        mountPath: /var/secrets/temporal/certs
        readOnly: true
      - name: temporal-pg-ca
        mountPath: /var/secrets/temporal/pg-ca
        readOnly: true

    additionalVolumes:
      - name: temporal-tls-certs
        secret:
          secretName: temporal-server-certs
          optional: true
      - name: temporal-pg-ca
        secret:
          secretName: temporal-pg-cluster-cert
          items:
            - key: ca.crt
              path: ca.crt

    config:
      logLevel: "info"
      numHistoryShards: 512

      namespaces:
        create: true
        namespace:
          - name: cloud
            retention: 3d
          - name: site
            retention: 3d

      persistence:
        defaultStore: default
        visibilityStore: visibility

        datastores:
          default:
            sql:
              pluginName: "postgres12"
              driverName: "postgres12"
              connectProtocol: "tcp"
              connectAddr: "temporal-pg-primary:5432"
              databaseName: temporal
              user: temporal
              existingSecret: temporal-pg-pguser-temporal
              manageSchema: true
              maxConns: 20
              maxConnLifetime: "1h"
              tls:
                enabled: true
                caFile: /var/secrets/temporal/pg-ca/ca.crt

          visibility:
            sql:
              pluginName: "postgres12"
              driverName: "postgres12"
              connectProtocol: "tcp"
              connectAddr: "temporal-pg-primary:5432"
              databaseName: temporal_visibility
              user: temporal
              existingSecret: temporal-pg-pguser-temporal
              manageSchema: true
              maxConns: 20
              maxConnLifetime: "1h"
              tls:
                enabled: true
                caFile: /var/secrets/temporal/pg-ca/ca.crt

      tls:
        refreshInterval: 15m
        internode:
          server:
            certFile: /var/secrets/temporal/certs/tls.crt
            keyFile: /var/secrets/temporal/certs/tls.key
            requireClientAuth: true
            clientCaFiles:
              - /var/secrets/temporal/certs/ca.crt
          client:
            serverName: interservice.server.temporal.local
            rootCaFiles:
              - /var/secrets/temporal/certs/ca.crt
        frontend:
          server:
            certFile: /var/secrets/temporal/certs/tls.crt
            keyFile: /var/secrets/temporal/certs/tls.key
            requireClientAuth: true
            clientCaFiles:
              - /var/secrets/temporal/certs/ca.crt
          client:
            serverName: interservice.server.temporal.local
            rootCaFiles:
              - /var/secrets/temporal/certs/ca.crt

    frontend:
      replicaCount: 1
      readinessProbe:
        grpc: null
        tcpSocket:
          port: 7233
        initialDelaySeconds: 10
      service:
        type: ClusterIP
        port: 7233

    history:
      replicaCount: 1
      service:
        port: 7234

    matching:
      replicaCount: 1
      service:
        port: 7235

    worker:
      replicaCount: 1
      service:
        port: 7239

  admintools:
    enabled: true
    image:
      pullPolicy: IfNotPresent
    securityContext: null
    containerSecurityContext: null
    additionalEnv:
      - name: TEMPORAL_TLS_CLIENT_CERT_PATH
        value: /var/secrets/temporal/certs/tls.crt
      - name: TEMPORAL_TLS_CLIENT_KEY_PATH
        value: /var/secrets/temporal/certs/tls.key
      - name: TEMPORAL_TLS_CA_CERT_PATH
        value: /var/secrets/temporal/certs/ca.crt
      - name: TEMPORAL_TLS_DISABLE_HOST_VERIFICATION
        value: "true"
    service:
      type: ClusterIP
      port: 22
    additionalVolumeMounts:
      - name: temporal-tls-certs
        mountPath: /var/secrets/temporal/certs
        readOnly: true
      - name: temporal-pg-ca
        mountPath: /var/secrets/temporal/pg-ca
        readOnly: true
    additionalVolumes:
      - name: temporal-tls-certs
        secret:
          secretName: temporal-server-certs
      - name: temporal-pg-ca
        secret:
          secretName: temporal-pg-cluster-cert
          items:
            - key: ca.crt
              path: ca.crt

  web:
    enabled: false

  schema:
    backoffLimit: 100
    securityContext: null
    containerSecurityContext: null

  shims:
    dockerize: false
    elasticsearchTool: false

# =============================================================================
# Global settings — inherited by all NICo REST sub-charts
# =============================================================================
global:
  image:
    repository: quay.io/fdupont-redhat
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  certificate:
    issuerRef:
      kind: ClusterIssuer
      name: nico-rest-ca-issuer
      group: cert-manager.io
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nico-cloud

# =============================================================================
# nico-rest-common — shared secrets and certificates
# =============================================================================
nico-rest-common:
  secrets:
    create: true
    dbCreds:
      username: nico
      password: nico
    keycloakClientSecret:
      value: "nico-local-secret"
    temporalEncryptionKey:
      value: "local-dev"
    imagePullSecret:
      dockerconfigjson: "eyJhdXRocyI6e319"
  certificate:
    temporalClientCloud:
      duration: 2160h
      renewBefore: 360h
      dnsNames:
        - temporal-client
        - nico-rest-api
        - cloud-worker
        - site-worker

# =============================================================================
# nico-rest-api
# =============================================================================
nico-rest-api:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8388
    metricsPort: 9360
  nodePort:
    enabled: false
    port: 30388
  secrets:
    temporalEncryptionKey: temporal-encryption-key
    temporalClientCerts: temporal-client-cloud-certs
    dbCreds: nico-cloud-pg-pguser-nico
  config:
    env:
      dev: true
      disconnected: true
    api:
      name: nico
      route:
        version: v2
    log:
      level: info
    db:
      host: nico-cloud-pg-primary
      port: 5432
      name: nico
      user: nico
      passwordPath: /var/secrets/db/password
    temporal:
      host: temporal-frontend
      port: 7233
      serverName: interservice.server.temporal.local
      namespace: cloud
      queue: cloud
      tls:
        enabled: true
        certPath: /var/secrets/temporal/certs/tls.crt
        keyPath: /var/secrets/temporal/certs/tls.key
        caPath: /var/secrets/temporal/certs/ca.crt
        disableHostVerification: true
      encryptionKeyPath: /var/secrets/temporal/encryption-key
    siteManager:
      enabled: true
      svcEndpoint: "https://nico-rest-site-manager:8100/v1/site"
    metrics:
      enabled: true
      port: 9360
    tracing:
      enabled: false
      serviceName: nico-rest-api
    issuers: []
    keycloak:
      enabled: true
      baseURL: "https://keycloak-service.rhbk-operator:8443"
      externalBaseURL: ""
      realm: "nico-dev"
      clientID: "nico-api"
      clientSecretPath: /var/secrets/keycloak/client-secret
      serviceAccount: true
    rateLimiter:
      enabled: false

# =============================================================================
# nico-rest-workflow — cloud-worker and site-worker
#
# Both workers run cloud-side. The site-worker listens on per-site Temporal
# namespaces (created dynamically by the REST API at site registration).
# =============================================================================
nico-rest-workflow:
  cloudWorker:
    replicaCount: 1
  siteWorker:
    replicaCount: 1
  secrets:
    temporalEncryptionKey: temporal-encryption-key
    temporalClientCerts: temporal-client-cloud-certs
    dbCreds: nico-cloud-pg-pguser-nico
  config:
    env:
      dev: false
    log:
      level: info
    db:
      host: nico-cloud-pg-primary
      port: 5432
      name: nico
      user: nico
      passwordPath: /var/secrets/db/password
    temporal:
      host: temporal-frontend
      port: 7233
      serverName: interservice.server.temporal.local
      namespace: cloud
      queue: cloud
      tls:
        enabled: true
        certPath: /var/secrets/temporal/certs/tls.crt
        keyPath: /var/secrets/temporal/certs/tls.key
        caPath: /var/secrets/temporal/certs/ca.crt
        disableHostVerification: true
      encryptionKeyPath: /var/secrets/temporal/encryption-key
    metrics:
      enabled: true
      port: 9360
    tracing:
      enabled: false

# =============================================================================
# nico-rest-site-manager
# =============================================================================
nico-rest-site-manager:
  replicaCount: 1
  args:
    listenPort: 8100
    credsManagerUrl: "https://nico-rest-cert-manager:8000"
    tlsCertPath: /etc/tls/tls.crt
    tlsKeyPath: /etc/tls/tls.key
    debug: false
  certificate:
    enabled: true
    secretName: site-manager-tls
    duration: 2160h
    renewBefore: 360h
    commonName: nico-rest-site-manager

# =============================================================================
# nico-rest-cert-manager (credsmgr) — issues Temporal client certs for
# site-agents during OTP bootstrap. Uses a CA cert from cert-manager.
# =============================================================================
nico-rest-cert-manager:
  enabled: true
  secrets:
    caSigningSecret: ca-signing-secret

# =============================================================================
# nico-rest-db — database migration job
# =============================================================================
nico-rest-db:
  waitForPostgres:
    image: registry.redhat.io/rhel10/postgresql-18:latest
  db:
    host: nico-cloud-pg-primary
    port: "5432"
    name: nico
    user: nico
  secrets:
    dbCreds: nico-cloud-pg-pguser-nico

# =============================================================================
# Crunchy PostgreSQL cluster for NICo REST
# =============================================================================
postgresql:
  enabled: true
  instances: 1
  storage:
    size: 5Gi
  database: nico
  owner: nico
