{{/*
SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

Raft peer TLS certificate for Vault HA cluster.
Used for Raft port 8201 peer-to-peer replication.
Issued by site-issuer before Vault starts.
*/}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-raft-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  secretName: vault-raft-tls
  duration: 720h0m0s
  renewBefore: 360h0m0s
  privateKey:
    algorithm: ECDSA
    size: 384
  dnsNames:
    - vault-0.vault-internal
    - vault-1.vault-internal
    - vault-2.vault-internal
  issuerRef:
    name: site-issuer
    kind: ClusterIssuer
    group: cert-manager.io
