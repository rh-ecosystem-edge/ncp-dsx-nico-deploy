{{- if .Values.rhbk.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.rhbk.namespace }}
  labels:
    {{- include "nvidia-infra-controller-prereqs.labels" . | nindent 4 }}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhbk-operator
  namespace: {{ .Values.rhbk.namespace }}
  labels:
    {{- include "nvidia-infra-controller-prereqs.labels" . | nindent 4 }}
  annotations:
spec:
  targetNamespaces:
    - {{ .Values.rhbk.namespace }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: {{ .Values.rhbk.namespace }}
  labels:
    {{- include "nvidia-infra-controller-prereqs.labels" . | nindent 4 }}
  annotations:
spec:
  channel: {{ .Values.rhbk.channel }}
  name: rhbk-operator
  source: {{ .Values.rhbk.source }}
  sourceNamespace: {{ .Values.rhbk.sourceNamespace }}
  installPlanApproval: {{ .Values.rhbk.installPlanApproval }}
{{- end }}
