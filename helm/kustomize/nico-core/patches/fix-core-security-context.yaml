# Remove SYS_PTRACE (not allowed by OpenShift restricted SCC, only needed
# for full debug backtraces). Set RUST_BACKTRACE=1 (short, production-safe).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nico-api
spec:
  template:
    spec:
      containers:
        - name: nico-api
          securityContext:
            capabilities:
              add: []
          env:
            - name: RUST_BACKTRACE
              value: "1"
