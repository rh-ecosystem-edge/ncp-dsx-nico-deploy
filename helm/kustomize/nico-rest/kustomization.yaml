apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - all.yaml

patches:
  # Fix imagePullPolicy on db migration init container
  - path: patches/fix-db-pullpolicy.yaml
    target:
      kind: Job
      name: nico-rest-db-migration-latest
  # Add PGSSLMODE for Crunchy PGO TLS connections
  - path: patches/fix-db-sslmode.yaml
    target:
      kind: Job
      name: nico-rest-db-migration-latest
  # Wait for Keycloak before starting API (JWKS fetch race)
  - path: patches/fix-api-wait-keycloak.yaml
    target:
      kind: Deployment
      name: nico-rest-api
  # Add NICo root CA to API trust store
  - path: patches/fix-api-trust-ca.yaml
    target:
      kind: Deployment
      name: nico-rest-api
  # Clear securityContext on credsmgr for OpenShift SCC
  - path: patches/fix-credsmgr-securitycontext.yaml
    target:
      kind: Deployment
      name: nico-rest-cert-manager
