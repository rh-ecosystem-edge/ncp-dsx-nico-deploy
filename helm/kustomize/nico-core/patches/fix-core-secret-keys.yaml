#
# Fix secret key name: Crunchy PGO uses 'user' not 'username'.
# Applied to both the migration Job and the nico-api Deployment.
apiVersion: batch/v1
kind: Job
metadata:
  name: nico-api-migrate
spec:
  template:
    spec:
      containers:
        - name: nico-api-migrate
          env:
            - name: DATASTORE_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: nico-site-pg-pguser-nico
