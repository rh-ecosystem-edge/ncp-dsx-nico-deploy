{{- if .Values.externalSecrets.enabled }}
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-external-secrets-operator
  namespace: {{ .Values.externalSecrets.namespace }}
  labels:
    {{- include "nvidia-infra-controller-prereqs.labels" . | nindent 4 }}
spec:
  channel: {{ .Values.externalSecrets.channel }}
  name: openshift-external-secrets-operator
  source: {{ .Values.externalSecrets.source }}
  sourceNamespace: {{ .Values.externalSecrets.sourceNamespace }}
  installPlanApproval: {{ .Values.externalSecrets.installPlanApproval }}
---
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  managementState: Managed
{{- end }}
