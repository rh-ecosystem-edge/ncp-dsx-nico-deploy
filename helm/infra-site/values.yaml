# =============================================================================
# Vault — BMC credential storage for Core tier (HA Raft + Transit auto-unseal)
# =============================================================================
vault:
  fullnameOverride: vault
  global:
    openshift: true
    tlsDisable: false
  injector:
    enabled: false
  csi:
    enabled: false
  ui:
    enabled: false
  server:
    image:
      repository: docker.io/hashicorp/vault
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"
    livenessProbe:
      enabled: true
      path: "/v1/sys/health?sealedcode=204&uninitcode=204&standbyok=true"
      initialDelaySeconds: 60
    extraEnvironmentVars:
      VAULT_CACERT: /vault/userconfig/vault-tls/ca.crt
      VAULT_TRANSIT_SEAL_TOKEN_FILE: /vault/userconfig/vault-transit-token/token
    volumes:
      - name: vault-tls
        secret:
          secretName: vault-tls
      - name: vault-raft-tls
        secret:
          secretName: vault-raft-tls
      - name: vault-transit-token
        secret:
          secretName: vault-transit-token
          optional: true
    volumeMounts:
      - mountPath: /vault/userconfig/vault-tls
        name: vault-tls
      - mountPath: /vault/userconfig/vault-raft-tls
        name: vault-raft-tls
      - mountPath: /vault/userconfig/vault-transit-token
        name: vault-transit-token
        readOnly: true
    shareProcessNamespace: true
    extraContainers:
      - name: vault-cert-reload
        image: registry.access.redhat.com/ubi10/ubi-minimal:latest
        command:
          - /bin/sh
          - -c
          - |
            microdnf install -y procps-ng && microdnf clean all
            last_mod=0
            while true; do
              cur_mod=$(stat -c %Y /vault/userconfig/vault-tls/tls.crt 2>/dev/null || echo 0)
              if [ "$cur_mod" -gt "$last_mod" ] && [ "$last_mod" -gt 0 ]; then
                pkill -HUP vault && echo "SIGHUP sent — Vault reloading TLS certs"
                last_mod=$cur_mod
              elif [ "$last_mod" -eq 0 ]; then
                last_mod=$cur_mod
              fi
              sleep 300
            done
        volumeMounts:
          - mountPath: /vault/userconfig/vault-tls
            name: vault-tls
            readOnly: true
    service:
      publishNotReadyAddresses: false
    dataStorage:
      enabled: true
      storageClass: null
      size: 5Gi
    auditStorage:
      enabled: true
      storageClass: null
      size: 1Gi
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    standalone:
      enabled: false
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        setNodeId: true
        config: |
          listener "tcp" {
            address         = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file      = "/vault/userconfig/vault-tls/tls.crt"
            tls_key_file       = "/vault/userconfig/vault-tls/tls.key"
            tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
            telemetry {
              unauthenticated_metrics_access = true
            }
          }

          storage "raft" {
            path = "/vault/data"
            retry_join {
              leader_tls_servername   = "vault-0.vault-internal"
              leader_api_addr         = "https://vault-0.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            retry_join {
              leader_tls_servername   = "vault-1.vault-internal"
              leader_api_addr         = "https://vault-1.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            retry_join {
              leader_tls_servername   = "vault-2.vault-internal"
              leader_api_addr         = "https://vault-2.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            autopilot {
              cleanup_dead_servers          = "true"
              last_contact_threshold        = "200ms"
              last_contact_failure_threshold = "10m"
              max_trailing_logs             = 250000
              min_quorum                    = 3
              server_stabilization_time     = "10s"
            }
          }

          seal "transit" {
            address     = "https://vault-transit:8200"
            token       = ""
            key_name    = "autounseal"
            mount_path  = "transit"
            tls_ca_cert = "/vault/userconfig/vault-tls/ca.crt"
          }

          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname          = true
          }

          service_registration "kubernetes" {}

# =============================================================================
# Vault configuration — AppRole, KV seeding, Flow tokens
# =============================================================================
vaultConfig:
  configJob:
    enabled: true
    vaultImage: "docker.io/hashicorp/vault:1.17"
    kubectlImage: "docker.io/bitnami/kubectl:latest"
  pkiMount: "nicoca"
  pkiRole: "nico-cluster"
  kvMount: "secrets"
  kvSeeds:
    - path: "machines/all_dpus/factory_default/bmc-metadata-items/root"
      data:
        UsernamePassword:
          username: "root"
          password: "0penBmc"
    - path: "machines/all_dpus/factory_default/uefi-metadata-items/auth"
      data:
        UsernamePassword:
          username: ""
          password: "bluefield"
  approle:
    enabled: true
    tokenTTL: "1h"
    tokenMaxTTL: "4h"

# =============================================================================
# NATS — MQTT event bus for DSX Exchange (BMS telemetry, leak detection)
# =============================================================================
nats:
  fullnameOverride: nats
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 1Gi
    mqtt:
      enabled: true
      port: 1883

# =============================================================================
# NICo Flow — controls whether Flow databases and Vault tokens are provisioned
# =============================================================================
flow:
  enabled: true

# =============================================================================
# Crunchy PostgreSQL cluster for NICo site
# =============================================================================
postgresql:
  enabled: true
  instances: 1
  storage:
    size: 5Gi

# =============================================================================
# nico-rest-common — shared secrets for site profile
# =============================================================================
nico-rest-common:
  secrets:
    create: true
    temporalEncryptionKey:
      value: ""
