apiVersion: v2
name: nvidia-infra-controller-cloud-infra
description: >-
  Red Hat infrastructure add-ons for NVIDIA Infra Controller cloud profile.
  Deploys Crunchy PostgreSQL, RHBK Keycloak, Temporal, OpenShift Routes,
  and ESO secrets. Installed before the upstream nico-rest chart.
type: application
version: 0.3.0
appVersion: "2.0.0-pr"

dependencies:
  - name: temporal
    version: "1.2.0"
    repository: "https://go.temporal.io/helm-charts"
