keycloakInstance:
  enabled: true
  namespace: rhbk-operator
  org: ncx
  admin:
    username: admin
    password: ""

postgresql:
  enabled: true
  instances: 1
  storage:
    size: 5Gi

nico-rest-common:
  secrets:
    keycloakClientSecret:
      # Must match nico-rest values. Override with --set for production.
      value: "MUST-BE-OVERRIDDEN"

nico-rest-cert-manager:
  enabled: true

# =============================================================================
# Temporal — official chart (https://go.temporal.io/helm-charts) v1.2.0
# =============================================================================
temporal:
  fullnameOverride: "temporal"

  server:
    enabled: true
    replicaCount: 1
    image:
      pullPolicy: IfNotPresent
    securityContext: null
    metrics:
      annotations:
        enabled: true
      serviceMonitor:
        enabled: false
      prometheus:
        timerType: histogram
    additionalEnv:
      - name: TEMPORAL_CLI_TLS_CERT
        value: /var/secrets/temporal/certs/tls.crt
      - name: TEMPORAL_CLI_TLS_KEY
        value: /var/secrets/temporal/certs/tls.key
      - name: TEMPORAL_CLI_TLS_CA
        value: /var/secrets/temporal/certs/ca.crt
      - name: TEMPORAL_CLI_TLS_ENABLE_HOST_VERIFICATION
        value: "false"
    additionalVolumeMounts:
      - name: temporal-tls-certs
        mountPath: /var/secrets/temporal/certs
        readOnly: true
      - name: temporal-pg-ca
        mountPath: /var/secrets/temporal/pg-ca
        readOnly: true
    additionalVolumes:
      - name: temporal-tls-certs
        secret:
          secretName: temporal-server-certs
          optional: true
      - name: temporal-pg-ca
        secret:
          secretName: nico-cloud-pg-server-tls
          items:
            - key: ca.crt
              path: ca.crt
    config:
      logLevel: "info"
      numHistoryShards: 512
      namespaces:
        create: true
        namespace:
          - name: cloud
            retention: 3d
          - name: site
            retention: 3d
          - name: flow
            retention: 3d
      persistence:
        defaultStore: default
        visibilityStore: visibility
        datastores:
          default:
            sql:
              pluginName: "postgres12"
              driverName: "postgres12"
              connectProtocol: "tcp"
              connectAddr: "nico-cloud-pg-primary:5432"
              databaseName: temporal
              user: temporal
              existingSecret: nico-cloud-pg-pguser-temporal
              manageSchema: true
              maxConns: 20
              maxConnLifetime: "1h"
              tls:
                enabled: true
                caFile: /var/secrets/temporal/pg-ca/ca.crt
          visibility:
            sql:
              pluginName: "postgres12"
              driverName: "postgres12"
              connectProtocol: "tcp"
              connectAddr: "nico-cloud-pg-primary:5432"
              databaseName: temporal_visibility
              user: temporal
              existingSecret: nico-cloud-pg-pguser-temporal
              manageSchema: true
              maxConns: 20
              maxConnLifetime: "1h"
              tls:
                enabled: true
                caFile: /var/secrets/temporal/pg-ca/ca.crt
      tls:
        refreshInterval: 15m
        internode:
          server:
            certFile: /var/secrets/temporal/certs/tls.crt
            keyFile: /var/secrets/temporal/certs/tls.key
            requireClientAuth: true
            clientCaFiles:
              - /var/secrets/temporal/certs/ca.crt
          client:
            serverName: interservice.server.temporal.local
            rootCaFiles:
              - /var/secrets/temporal/certs/ca.crt
        frontend:
          server:
            certFile: /var/secrets/temporal/certs/tls.crt
            keyFile: /var/secrets/temporal/certs/tls.key
            requireClientAuth: true
            clientCaFiles:
              - /var/secrets/temporal/certs/ca.crt
          client:
            serverName: interservice.server.temporal.local
            rootCaFiles:
              - /var/secrets/temporal/certs/ca.crt
    frontend:
      replicaCount: 1
      readinessProbe:
        grpc: null
        tcpSocket:
          port: 7233
        initialDelaySeconds: 10
      service:
        type: ClusterIP
        port: 7233
    history:
      replicaCount: 1
      service:
        port: 7234
    matching:
      replicaCount: 1
      service:
        port: 7235
    worker:
      replicaCount: 1
      service:
        port: 7239

  admintools:
    enabled: true
    image:
      pullPolicy: IfNotPresent
    securityContext: null
    containerSecurityContext: null
    additionalEnv:
      - name: TEMPORAL_TLS_CLIENT_CERT_PATH
        value: /var/secrets/temporal/certs/tls.crt
      - name: TEMPORAL_TLS_CLIENT_KEY_PATH
        value: /var/secrets/temporal/certs/tls.key
      - name: TEMPORAL_TLS_CA_CERT_PATH
        value: /var/secrets/temporal/certs/ca.crt
      - name: TEMPORAL_TLS_DISABLE_HOST_VERIFICATION
        value: "true"
    service:
      type: ClusterIP
      port: 22
    additionalVolumeMounts:
      - name: temporal-tls-certs
        mountPath: /var/secrets/temporal/certs
        readOnly: true
      - name: temporal-pg-ca
        mountPath: /var/secrets/temporal/pg-ca
        readOnly: true
    additionalVolumes:
      - name: temporal-tls-certs
        secret:
          secretName: temporal-server-certs
      - name: temporal-pg-ca
        secret:
          secretName: nico-cloud-pg-server-tls
          items:
            - key: ca.crt
              path: ca.crt

  web:
    enabled: false

  schema:
    backoffLimit: 100
    securityContext: null
    containerSecurityContext: null

  shims:
    dockerize: false
    elasticsearchTool: false
