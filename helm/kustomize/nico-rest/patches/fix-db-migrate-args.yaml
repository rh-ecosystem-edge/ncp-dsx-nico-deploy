#
# The nico-rest-db migration binary requires "db init_migrate" arguments.
# Without them it prints help and exits 0 without running migrations.
apiVersion: batch/v1
kind: Job
metadata:
  name: placeholder
spec:
  template:
    spec:
      containers:
        - name: migrations
          args:
            - db
            - init_migrate
