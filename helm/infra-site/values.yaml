# =============================================================================
# Vault — BMC credential storage for Core tier (HA Raft + Transit auto-unseal)
# =============================================================================
vault:
  fullnameOverride: vault
  global:
    openshift: true
    tlsDisable: false
  injector:
    enabled: false
  csi:
    enabled: false
  ui:
    enabled: false
  server:
    image:
      repository: docker.io/hashicorp/vault
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"
    livenessProbe:
      enabled: true
      path: "/v1/sys/health?sealedcode=204&uninitcode=204&standbyok=true"
      initialDelaySeconds: 60
    extraEnvironmentVars:
      VAULT_CACERT: /vault/userconfig/vault-tls/ca.crt
    volumes:
      - name: vault-tls
        secret:
          secretName: vault-tls
      - name: vault-raft-tls
        secret:
          secretName: vault-raft-tls
    volumeMounts:
      - mountPath: /vault/userconfig/vault-tls
        name: vault-tls
      - mountPath: /vault/userconfig/vault-raft-tls
        name: vault-raft-tls
    postStart:
      - /bin/sh
      - -c
      - |
        export VAULT_ADDR=https://127.0.0.1:8200
        export VAULT_SKIP_VERIFY=true
        APISERVER=https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

        # Wait for Vault to be listening
        until vault status -format=json 2>/dev/null | grep -q '"initialized"'; do
          sleep 2
        done

        if vault status -format=json 2>/dev/null | grep -q '"initialized".*false'; then
          # First boot — initialize and unseal
          INIT=$(vault operator init -key-shares=1 -key-threshold=1 -format=json)
          UNSEAL_KEY=$(echo "$INIT" | sed -n 's/.*"unseal_keys_b64":\["\([^"]*\)".*/\1/p')
          ROOT_TOKEN=$(echo "$INIT" | sed -n 's/.*"root_token":"\([^"]*\)".*/\1/p')
          vault operator unseal "$UNSEAL_KEY"

          # Store keys in K8s Secret via API
          KEY_B64=$(echo -n "$UNSEAL_KEY" | base64)
          TOKEN_B64=$(echo -n "$ROOT_TOKEN" | base64)
          wget -q -O /dev/null --method=POST \
            --header="Authorization: Bearer ${SA_TOKEN}" \
            --header="Content-Type: application/json" \
            --no-check-certificate \
            --body-data="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"vault-unseal-secret\",\"namespace\":\"${NS}\"},\"type\":\"Opaque\",\"data\":{\"unseal-key\":\"${KEY_B64}\",\"root-token\":\"${TOKEN_B64}\",\"token\":\"${TOKEN_B64}\"}}" \
            "${APISERVER}/api/v1/namespaces/${NS}/secrets" 2>/dev/null || true
        elif vault status -format=json 2>/dev/null | grep -q '"sealed".*true'; then
          # Already initialized — read unseal key from Secret and unseal
          UNSEAL_KEY=$(wget -q -O - \
            --header="Authorization: Bearer ${SA_TOKEN}" \
            --no-check-certificate \
            "${APISERVER}/api/v1/namespaces/${NS}/secrets/vault-unseal-secret" 2>/dev/null \
            | sed -n 's/.*"unseal-key": *"\([^"]*\)".*/\1/p' | head -1)
          if [ -n "$UNSEAL_KEY" ]; then
            vault operator unseal "$(echo "$UNSEAL_KEY" | base64 -d)" 2>/dev/null || true
          fi
        fi
    shareProcessNamespace: true
    extraContainers:
      - name: vault-cert-reload
        image: registry.access.redhat.com/ubi10/ubi-minimal:latest
        command:
          - /bin/sh
          - -c
          - |
            microdnf install -y procps-ng && microdnf clean all
            last_mod=0
            while true; do
              cur_mod=$(stat -c %Y /vault/userconfig/vault-tls/tls.crt 2>/dev/null || echo 0)
              if [ "$cur_mod" -gt "$last_mod" ] && [ "$last_mod" -gt 0 ]; then
                pkill -HUP vault && echo "SIGHUP sent — Vault reloading TLS certs"
                last_mod=$cur_mod
              elif [ "$last_mod" -eq 0 ]; then
                last_mod=$cur_mod
              fi
              sleep 300
            done
        volumeMounts:
          - mountPath: /vault/userconfig/vault-tls
            name: vault-tls
            readOnly: true
    service:
      publishNotReadyAddresses: false
    dataStorage:
      enabled: true
      storageClass: null
      size: 5Gi
    auditStorage:
      enabled: true
      storageClass: null
      size: 1Gi
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    standalone:
      enabled: false
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        setNodeId: true
        config: |
          listener "tcp" {
            address         = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file      = "/vault/userconfig/vault-tls/tls.crt"
            tls_key_file       = "/vault/userconfig/vault-tls/tls.key"
            tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
            telemetry {
              unauthenticated_metrics_access = true
            }
          }

          storage "raft" {
            path = "/vault/data"
            retry_join {
              leader_tls_servername   = "vault-0.vault-internal"
              leader_api_addr         = "https://vault-0.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            retry_join {
              leader_tls_servername   = "vault-1.vault-internal"
              leader_api_addr         = "https://vault-1.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            retry_join {
              leader_tls_servername   = "vault-2.vault-internal"
              leader_api_addr         = "https://vault-2.vault-internal:8200"
              leader_ca_cert_file     = "/vault/userconfig/vault-raft-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-raft-tls/tls.crt"
              leader_client_key_file  = "/vault/userconfig/vault-raft-tls/tls.key"
            }
            autopilot {
              cleanup_dead_servers          = "true"
              last_contact_threshold        = "200ms"
              last_contact_failure_threshold = "10m"
              max_trailing_logs             = 250000
              min_quorum                    = 3
              server_stabilization_time     = "10s"
            }
          }

          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname          = true
          }

          service_registration "kubernetes" {}

# =============================================================================
# Vault configuration — AppRole, KV seeding, Flow tokens
# =============================================================================
vaultConfig:
  configJob:
    enabled: true
    vaultImage: "docker.io/hashicorp/vault:1.17"
    kubectlImage: "docker.io/bitnami/kubectl:latest"
  pkiMount: "nicoca"
  pkiRole: "nico-cluster"
  kvMount: "secrets"
  kvSeeds:
    - path: "machines/all_dpus/factory_default/bmc-metadata-items/root"
      data:
        UsernamePassword:
          username: "root"
          password: "0penBmc"
    - path: "machines/all_dpus/factory_default/uefi-metadata-items/auth"
      data:
        UsernamePassword:
          username: ""
          password: "bluefield"
  approle:
    enabled: true
    tokenTTL: "1h"
    tokenMaxTTL: "4h"

# =============================================================================
# NATS — MQTT event bus for DSX Exchange (BMS telemetry, leak detection)
# =============================================================================
nats:
  fullnameOverride: nats
  natsBox:
    enabled: false
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 1Gi
    mqtt:
      enabled: true
      port: 1883

# =============================================================================
# NICo Flow — controls whether Flow databases and Vault tokens are provisioned
# =============================================================================
flow:
  enabled: true

# =============================================================================
# Crunchy PostgreSQL cluster for NICo site
# =============================================================================
postgresql:
  enabled: true
  instances: 1
  storage:
    size: 5Gi

# =============================================================================
# nico-rest-common — shared secrets for site profile
# =============================================================================
nico-rest-common:
  secrets:
    create: true
    temporalEncryptionKey:
      value: ""
