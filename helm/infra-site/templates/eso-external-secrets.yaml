{{/*
SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

ESO resources to sync the root CA certificate from cert-manager namespace
into the site namespace as nico-roots (used by Core nico-api for Vault TLS trust).
*/}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nico-roots-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site-infra.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cert-manager-ns-secretstore
    kind: ClusterSecretStore
  target:
    name: nico-roots
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        ca.crt: "{{ "{{ .ca_crt }}" }}"
  data:
    - secretKey: ca_crt
      remoteRef:
        key: nico-root-ca-secret
        property: ca.crt
