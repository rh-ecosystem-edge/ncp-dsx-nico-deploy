#
# Fix secret key name in flow Deployment: Crunchy PGO uses 'user' not 'username'.
# All three containers (flow, psm, nsm) reference DB_USER from the PG secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow
spec:
  template:
    spec:
      containers:
        - name: flow
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: nico-site-pg-pguser-nico
        - name: psm
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: nico-site-pg-pguser-nico
        - name: nsm
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: nico-site-pg-pguser-nico
