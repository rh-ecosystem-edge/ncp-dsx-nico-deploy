# Make nico-roots (Vault CA) volume optional for dev environments.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nico-api
spec:
  template:
    spec:
      volumes:
        - name: nico-roots
          secret:
            secretName: nico-roots
            optional: true
