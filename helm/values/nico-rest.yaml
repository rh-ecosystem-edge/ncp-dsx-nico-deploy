# =============================================================================
# Values override for upstream nico-rest chart
# Deployed in the nico-rest namespace
# =============================================================================

global:
  image:
    repository: quay.io/fdupont-redhat
    tag: latest
    pullPolicy: IfNotPresent
  certificate:
    issuerRef:
      kind: ClusterIssuer
      name: nico-rest-ca-issuer
      group: cert-manager.io
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nico-rest

nico-rest-common:
  secrets:
    create: true
    dbCreds:
      username: nico
      password: ""
    keycloakClientSecret:
      value: ""
    temporalEncryptionKey:
      value: ""
    imagePullSecret:
      dockerconfigjson: "eyJhdXRocyI6e319"
  certificate:
    temporalClientCloud:
      duration: 2160h
      renewBefore: 360h
      dnsNames:
        - temporal-client
        - nico-rest-api
        - cloud-worker
        - site-worker

nico-rest-api:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8388
    metricsPort: 9360
  nodePort:
    enabled: false
    port: 30388
  secrets:
    temporalEncryptionKey: temporal-encryption-key
    temporalClientCerts: temporal-client-cloud-certs
    dbCreds: nico-cloud-pg-pguser-nico
  config:
    env:
      dev: false
      disconnected: true
    api:
      name: nico
      route:
        version: v2
    log:
      level: info
    db:
      host: nico-cloud-pg-primary
      port: 5432
      name: nico
      user: nico
      passwordPath: /var/secrets/db/password
    temporal:
      host: temporal-frontend
      port: 7233
      serverName: interservice.server.temporal.local
      namespace: cloud
      queue: cloud
      tls:
        enabled: true
        certPath: /var/secrets/temporal/certs/tls.crt
        keyPath: /var/secrets/temporal/certs/tls.key
        caPath: /var/secrets/temporal/certs/ca.crt
        disableHostVerification: true
      encryptionKeyPath: /var/secrets/temporal/encryption-key
    siteManager:
      enabled: true
      svcEndpoint: "https://nico-rest-site-manager:8100/v1/site"
    metrics:
      enabled: true
      port: 9360
    tracing:
      enabled: false
      serviceName: nico-rest-api
    issuers: []
    keycloak:
      enabled: true
      baseURL: "https://keycloak-service.rhbk-operator:8443"
      externalBaseURL: ""
      realm: "nico"
      clientID: "nico-rest"
      clientSecretPath: /var/secrets/keycloak/client-secret
      serviceAccount: true
    rateLimiter:
      enabled: false

nico-rest-workflow:
  cloudWorker:
    replicaCount: 1
  siteWorker:
    replicaCount: 1
  secrets:
    temporalEncryptionKey: temporal-encryption-key
    temporalClientCerts: temporal-client-cloud-certs
    dbCreds: nico-cloud-pg-pguser-nico
  config:
    env:
      dev: false
    log:
      level: info
    db:
      host: nico-cloud-pg-primary
      port: 5432
      name: nico
      user: nico
      passwordPath: /var/secrets/db/password
    temporal:
      host: temporal-frontend
      port: 7233
      serverName: interservice.server.temporal.local
      namespace: cloud
      queue: cloud
      tls:
        enabled: true
        certPath: /var/secrets/temporal/certs/tls.crt
        keyPath: /var/secrets/temporal/certs/tls.key
        caPath: /var/secrets/temporal/certs/ca.crt
        disableHostVerification: true
      encryptionKeyPath: /var/secrets/temporal/encryption-key
    metrics:
      enabled: true
      port: 9360
    tracing:
      enabled: false

nico-rest-site-manager:
  replicaCount: 1
  args:
    listenPort: 8100
    credsManagerUrl: "https://nico-rest-cert-manager:8000"
    tlsCertPath: /etc/tls/tls.crt
    tlsKeyPath: /etc/tls/tls.key
    debug: false
  certificate:
    enabled: true
    secretName: site-manager-tls
    duration: 2160h
    renewBefore: 360h
    commonName: nico-rest-site-manager

nico-rest-cert-manager:
  enabled: true
  secrets:
    caSigningSecret: ca-signing-secret

nico-rest-db:
  waitForPostgres:
    image: registry.redhat.io/rhel10/postgresql-18:latest
  db:
    host: nico-cloud-pg-primary
    port: "5432"
    name: nico
    user: nico
  secrets:
    dbCreds: nico-cloud-pg-pguser-nico
