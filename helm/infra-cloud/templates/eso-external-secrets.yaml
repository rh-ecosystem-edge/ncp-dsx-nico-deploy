SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

ESO resources to sync the root CA certificate from cert-manager namespace
into the cloud namespace as ca-signing-secret (used by credsmgr).
Replaces the credsmgr-ca-cert.yaml hook Job.
*/}}
{{- if index .Values "nico-rest-cert-manager" "enabled" }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cert-manager-ns-secretstore
  labels:
    {{- include "nvidia-infra-controller-cloud-infra.labels" . | nindent 4 }}
spec:
  provider:
    kubernetes:
      remoteNamespace: cert-manager
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: cert-manager
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cert-manager-ns
          namespace: cert-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cert-manager-ns
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["nico-root-ca-secret"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-secret-reader
subjects:
  - kind: ServiceAccount
    name: eso-cert-manager-ns
    namespace: cert-manager
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ca-signing-secret-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-cloud-infra.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cert-manager-ns-secretstore
    kind: ClusterSecretStore
  target:
    name: ca-signing-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        tls.crt: "{{ "{{ .tls_crt }}" }}"
        tls.key: "{{ "{{ .tls_key }}" }}"
        ca.crt: "{{ "{{ .ca_crt }}" }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: nico-root-ca-secret
        property: tls.crt
    - secretKey: tls_key
      remoteRef:
        key: nico-root-ca-secret
        property: tls.key
    - secretKey: ca_crt
      remoteRef:
        key: nico-root-ca-secret
        property: ca.crt
{{- end }}
{{- if .Values.keycloakInstance.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: nico-rest-ns-secretstore
  labels:
    {{- include "nvidia-infra-controller-cloud-infra.labels" . | nindent 4 }}
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Release.Namespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: {{ .Release.Namespace }}
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-nico-rest-ns
          namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-nico-rest-ns
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-pg-secret-reader
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-pg-secret-reader
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-pg-secret-reader
subjects:
  - kind: ServiceAccount
    name: eso-nico-rest-ns
    namespace: {{ .Release.Namespace }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-pg-creds-eso
  namespace: {{ .Values.keycloakInstance.namespace }}
  labels:
    {{- include "nvidia-infra-controller-cloud-infra.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: nico-rest-ns-secretstore
    kind: ClusterSecretStore
  target:
    name: nico-cloud-pg-pguser-keycloak
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: nico-cloud-pg-pguser-keycloak
{{- end }}
