SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

Keycloak realm import aligned with upstream realm-configmap.yaml.
Uses RHBK operator KeycloakRealmImport CRD instead of upstream's ConfigMap approach.
*/}}
{{- if .Values.keycloakInstance.enabled }}
{{- $org := .Values.keycloakInstance.org | default "ncx" }}
{{- $clientSecret := index .Values "nico-rest-common" "secrets" "keycloakClientSecret" "value" }}
apiVersion: k8s.keycloak.org/v2beta1
kind: KeycloakRealmImport
metadata:
  name: nico-realm
  namespace: {{ .Values.keycloakInstance.namespace }}
  labels:
    {{- include "nvidia-infra-controller-cloud.labels" . | nindent 4 }}
spec:
  keycloakCRName: keycloak
  realm:
    realm: nico
    enabled: true
    displayName: NICo
    sslRequired: none
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    resetPasswordAllowed: true
    editUsernameAllowed: false
    bruteForceProtected: true
    roles:
      realm:
        - name: "{{ $org }}:NICO_PROVIDER_ADMIN"
          description: "NICo Provider Administrator"
        - name: "{{ $org }}:NICO_TENANT_ADMIN"
          description: "NICo Tenant Administrator"
        - name: "{{ $org }}:NICO_PROVIDER_VIEWER"
          description: "NICo Provider Viewer"
        - name: admin
          description: "Administrator role"
        - name: user
          description: "Regular user role"
      client:
        nico-rest:
          - name: api-access
            description: "Access to NICo REST API"
    clients:
      - clientId: nico-rest
        name: NICo REST API
        enabled: true
        clientAuthenticatorType: client-secret
        secret: {{ $clientSecret }}
        redirectUris:
          - "*"
        webOrigins:
          - "*"
        publicClient: false
        protocol: openid-connect
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: true
        authorizationServicesEnabled: false
        standardFlowEnabled: true
        implicitFlowEnabled: false
        fullScopeAllowed: true
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        protocolMappers:
          - name: audience
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: nico-rest
              id.token.claim: "true"
              access.token.claim: "true"
          - name: oidc_id
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              user.attribute: oidc_id
              claim.name: oidc_id
              jsonType.label: String
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
      - clientId: ncx-service
        name: NICo Service Account
        enabled: true
        clientAuthenticatorType: client-secret
        secret: {{ $clientSecret }}
        publicClient: false
        protocol: openid-connect
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        standardFlowEnabled: false
        implicitFlowEnabled: false
        fullScopeAllowed: true
        defaultClientScopes:
          - email
          - profile
          - roles
        attributes:
          access.token.lifespan: "1800"
          client.session.idle.timeout: "1800"
          client.session.max.lifespan: "1800"
        protocolMappers:
          - name: oidc_id
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              user.attribute: oidc_id
              claim.name: oidc_id
              jsonType.label: String
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
          - name: Client ID
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            consentRequired: false
            config:
              user.session.note: clientId
              claim.name: client_id
              jsonType.label: String
              id.token.claim: "true"
              access.token.claim: "true"
    users:
      - username: service-account-ncx-service
        enabled: true
        serviceAccountClientId: ncx-service
        realmRoles:
          - "{{ $org }}:NICO_PROVIDER_ADMIN"
          - "{{ $org }}:NICO_TENANT_ADMIN"
        clientRoles:
          nico-rest:
            - api-access
        attributes:
          oidc_id:
            - ncx-service-oidc-001
    defaultDefaultClientScopes:
      - role_list
      - profile
      - email
      - roles
      - web-origins
      - acr
    defaultOptionalClientScopes:
      - offline_access
      - address
      - phone
      - microprofile-jwt
{{- end }}
