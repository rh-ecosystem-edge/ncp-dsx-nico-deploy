apiVersion: v2
name: nvidia-infra-controller-cloud
description: >-
  NVIDIA Infra Controller cloud profile — self-contained chart that deploys
  operators (cert-manager, Crunchy PGO, RHBK), Keycloak, Temporal, and NICo REST
  workloads (API, cloud-worker, site-manager, DB migration).
type: application
version: 0.1.0
appVersion: "1.6.0"

dependencies:
  - name: temporal
    version: "1.2.0"
    repository: "https://go.temporal.io/helm-charts"
  - name: nico-rest-common
    version: "0.1.0"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-common"
  - name: nico-rest-api
    version: "0.1.1"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-api"
  - name: nico-rest-workflow
    version: "0.1.0"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-workflow"
  - name: nico-rest-site-manager
    version: "0.1.1"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-site-manager"
  - name: nico-rest-cert-manager
    version: "0.1.0"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-cert-manager"
    condition: nico-rest-cert-manager.enabled
  - name: nico-rest-db
    version: "0.1.0"
    repository: "file://../vendor/infra-controller/rest-api/helm/charts/nico-rest/charts/nico-rest-db"
